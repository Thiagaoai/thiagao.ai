<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThigaoA.i Logo Kit</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --card: rgba(15, 23, 42, 0.72);
        --border: rgba(148, 163, 184, 0.18);
        --text: #f8fafc;
        --muted: #94a3b8;
        --cyan: #22d3ee;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 72% 18%, rgba(34, 211, 238, 0.18), transparent 30%),
          radial-gradient(circle at 24% 88%, rgba(245, 158, 11, 0.12), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(920px, calc(100vw - 32px));
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: 36px;
        background: linear-gradient(145deg, rgba(15, 23, 42, 0.86), rgba(2, 6, 23, 0.72));
        box-shadow: 0 34px 100px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(24px);
      }
      .grid {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 40px;
        align-items: center;
      }
      .logo-box {
        display: grid;
        place-items: center;
        min-height: 280px;
        border: 1px solid var(--border);
        border-radius: 32px;
        background: rgba(2, 6, 23, 0.72);
      }
      img {
        width: 190px;
        height: 190px;
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 6vw, 76px);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }
      p {
        margin: 22px 0 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        font-weight: 800;
      }
      a.primary {
        border: 0;
        color: #020617;
        background: linear-gradient(135deg, #fde68a, #22d3ee 48%, #60a5fa);
      }
      code {
        color: var(--cyan);
      }
      @media (max-width: 760px) {
        main {
          padding: 24px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="grid">
        <div class="logo-box">
          <img src="/thigaoai-mark-wow.svg" alt="ThigaoA.i logo wow" />
        </div>
        <section>
          <h1>ThigaoA.i<br />Logo Kit</h1>
          <p>
            Opção premium com ponto de <code>.i</code> geométrico, sem parecer olho: monograma
            <code>T + A</code>, arco orbital de automação, energia de IA e leitura forte para favicon,
            navbar e avatar social.
          </p>
          <div class="actions">
            <a class="primary" href="/thigaoai-mark-wow.svg" download>Baixar SVG</a>
            <a href="/favicon.svg" download>Baixar logo atual</a>
            <a href="/rebrand-preview">Voltar ao site</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
