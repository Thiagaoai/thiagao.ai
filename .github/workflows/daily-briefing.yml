name: Daily ThigaoA.i Briefing

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run the agent without saving, publishing, or sending email.
        required: false
        type: boolean
        default: false
  schedule:
    # GitHub cron runs in UTC. This runs around 5 PM New York across DST.
    # The agent endpoint is idempotent for the New York day, so delayed or
    # duplicated schedule runs will not send duplicate emails.
    - cron: '0 21,22 * * *'

jobs:
  publish-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Check New York time
        id: time
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          SHOULD_RUN=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN=true
          elif [ "$HOUR" -ge 17 ] && [ "$HOUR" -le 23 ]; then
            SHOULD_RUN=true
          fi
          echo "hour=$HOUR" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "New York hour: $HOUR"
          echo "Should run: $SHOULD_RUN"

      - name: Skip outside the late-afternoon send window
        if: steps.time.outputs.should_run != 'true'
        run: echo "Outside the 5 PM New York send window. Skipping."

      - name: Call briefing agent
        if: steps.time.outputs.should_run == 'true'
        run: |
          DRY_RUN="${{ inputs.dry_run || false }}"
          FORCE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$DRY_RUN" != "true" ]; then
            FORCE=true
          fi
          curl --fail-with-body -X POST "${{ secrets.BRIEFING_AGENT_URL }}" \
            -H "Authorization: Bearer ${{ secrets.AGENT_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --data "{\"force\":$FORCE,\"dryRun\":$DRY_RUN}"
